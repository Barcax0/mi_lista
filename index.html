<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist Autocaravana 🚐</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --primary: #007bff; --success: #28a745; --danger: #dc3545; --text: #eee; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 450px; }
        .input-group { display: flex; gap: 8px; margin-bottom: 20px; }
        input { flex-grow: 1; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #252525; color: white; }
        button { padding: 10px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        .btn-add { background: var(--primary); color: white; }
        
        h2 { font-size: 1.2rem; border-left: 4px solid var(--primary); padding-left: 10px; margin-top: 30px; }
        ul { list-style: none; padding: 0; }
        li { background: var(--card); margin: 8px 0; padding: 12px; display: flex; justify-content: space-between; border-radius: 10px; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        .actions { display: flex; gap: 5px; }
        .btn-check { background: var(--success); color: white; font-size: 0.8rem; }
        .btn-del { background: transparent; color: var(--danger); border: 1px solid var(--danger); font-size: 0.8rem; }
        .btn-reset { background: var(--danger); color: white; width: 100%; margin-top: 40px; padding: 15px; }
        
        .item-text { flex-grow: 1; margin-right: 10px; }
        .strikethrough { text-decoration: line-through; color: #777; }
    </style>
</head>
<body>

    <div class="container">
        <h1 style="text-align: center;">🚐 Mi Ruta</h1>
        
        <div class="input-group">
            <input type="text" id="itemInput" placeholder="¿Qué falta en la auto?">
            <button class="btn-add" onclick="addItem()">Añadir</button>
        </div>

        <h2>Pendiente de cargar 🚩</h2>
        <ul id="pendingList"></ul>

        <h2>Ya en la Autocaravana ✅</h2>
        <ul id="readyList"></ul>

        <button class="btn-reset" onclick="resetList()">🔄 Reiniciar para nuevo viaje</button>
        <p style="font-size: 0.7rem; text-align: center; color: #555; margin-top: 10px;">Los datos se guardan localmente en este navegador.</p>
    </div>

    <script>
        let items = JSON.parse(localStorage.getItem('vanList')) || [];

        function render() {
            const pendingList = document.getElementById('pendingList');
            const readyList = document.getElementById('readyList');
            pendingList.innerHTML = '';
            readyList.innerHTML = '';

            items.forEach((item, index) => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span class="item-text ${item.status === 'ready' ? 'strikethrough' : ''}">${item.text}</span>
                    <div class="actions">
                        <button class="btn-check" onclick="toggleItem(${index})">${item.status === 'pending' ? '✓' : '↩'}</button>
                        <button class="btn-del" onclick="deleteItem(${index})">✕</button>
                    </div>
                `;
                
                if (item.status === 'pending') {
                    pendingList.appendChild(li);
                } else {
                    readyList.appendChild(li);
                }
            });
            localStorage.setItem('vanList', JSON.stringify(items));
        }

        function addItem() {
            const input = document.getElementById('itemInput');
            if (input.value.trim() === '') return;
            items.unshift({ text: input.value, status: 'pending' });
            input.value = '';
            render();
        }

        function toggleItem(index) {
            items[index].status = items[index].status === 'pending' ? 'ready' : 'pending';
            render();
        }

        function deleteItem(index) {
            items.splice(index, 1);
            render();
        }

        function resetList() {
            if(confirm("¿Quieres pasar todo a la lista de 'Pendiente' para empezar un nuevo viaje?")) {
                items.forEach(item => item.status = 'pending');
                render();
            }
        }

        // Permitir añadir con la tecla Enter
        document.getElementById('itemInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') addItem();
        });

        render();
    </script>
</body>
</html>
